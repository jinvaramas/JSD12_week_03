<!-- Main Content -->

  display: flex;
  flex-direction: column;

  <!-- Order Form -->
  <h1 style="

    color: rgb(253, 253, 253);
    text-align: center;
    padding: 10px 20px;
    border-radius: 10px;
  ">
    👨🏿‍🦱👩🏻‍🦰👩🏻‍🦲🍦 𝙊𝙧𝙙𝙚𝙧 𝘼𝙝𝙤𝙮 𝙄𝙘𝙚 𝘾𝙧𝙚𝙖𝙢 𝙃𝙚𝙧𝙚 🍦🧑🏻🧑🏽👦🏻

  <!-- Form -->
  <form action="#" method="POST" style="
    background-color: rgba(255, 255, 255, 0.534);
    padding: 50px;
    border-radius: 10px;
    margin-top: 15px;
    width: 450px;
  ">

    <label for="name";>Full Name👦🏻</label><br>
    <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

    <label for="phone">Phone Number</label><br>
    <input type="tel" id="phone" name="phone" placeholder="08xxxxxxxx"><br><br>

    <label for="flavor">Choose Flavor</label><br>

      <option>Demogorgon Dark Chocolate</option>
      <option>Upside Down Vanilla</option>
    </select><br><br>

    <label for="quantity">Quantity</label><br>
    <input type="number" id="quantity" name="quantity" min="1" max="10" required><br><br>

    <label>Size</label><br>
    <input type="radio" name="size" value="small" required> Small 99฿  
    <input type="radio" name="size" value="medium"> Medium 149฿
    <input type="radio" name="size" value="large"> Large 199฿<br><br>

   <label>Extra Toppings</label><br>
<input type="checkbox" name="topping" value="sprinkles"> Sprinkles 🌈 15฿
<input type="checkbox" name="topping" value="chocolate"> Chocolate Sauce 🍫 25฿
<input type="checkbox" name="topping" value="oreo"> Oreo 🍪 30฿<br><br> 

    <label for="delivery">Delivery Method</label><br>
    <select id="delivery" name="delivery">
      <option>Eat here 🧇</option>

    </select><br><br>

    <label for="note">Note</label><br>
    <textarea id="note" name="note" rows="3"></textarea><br><br>

    <button type="submit">Place Order 🍦</button>

  </form>
